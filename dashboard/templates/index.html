<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Bot - Polymarket Copy Trading</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #2a2a4a;
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #12121a;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #1e1e2e;
        }
        
        .card h2 {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
        }
        
        .stat-value.positive {
            color: #00d084;
        }
        
        .stat-value.negative {
            color: #ff4757;
        }
        
        .settings-form {
            display: grid;
            gap: 15px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .form-group input {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        button {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        .trades-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .trades-table th,
        .trades-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #1e1e2e;
        }
        
        .trades-table th {
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        
        .trades-table tr:hover {
            background: #1a1a2e;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge-buy {
            background: rgba(0, 208, 132, 0.2);
            color: #00d084;
        }
        
        .badge-sell {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }
        
        .badge-executed {
            background: rgba(0, 208, 132, 0.2);
            color: #00d084;
        }
        
        .badge-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .badge-failed {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }
        
        .latency {
            font-family: monospace;
            color: #00d4ff;
        }
        
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .connection-status.connected {
            background: rgba(0, 208, 132, 0.2);
            color: #00d084;
        }
        
        .connection-status.disconnected {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }
        
        .target-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .target-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e1e2e;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab:hover {
            color: #fff;
        }
        
        .tab.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .trades-table {
                font-size: 0.85rem;
            }
            
            .trades-table th,
            .trades-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status disconnected" id="connectionStatus">Disconnected</div>
    
    <div class="container">
        <header>
            <h1>🤖 PM Bot</h1>
            <p class="subtitle">Polymarket Copy Trading Bot</p>
            <div class="target-info">
                <div class="target-avatar">@</div>
                <div>
                    <div style="font-weight: 600;">Target: <span id="targetUsername">Loading...</span></div>
                    <div style="font-size: 0.85rem; color: #888;">Copying trades in real-time</div>
                </div>
            </div>
        </header>
        
        <div class="grid">
            <div class="card">
                <h2>📊 Total Trades</h2>
                <div class="stat-value" id="totalTrades">0</div>
            </div>
            <div class="card">
                <h2>💰 Total Volume</h2>
                <div class="stat-value" id="totalVolume">$0</div>
            </div>
            <div class="card">
                <h2>⚡ Avg Latency</h2>
                <div class="stat-value" id="avgLatency">0s</div>
            </div>
            <div class="card">
                <h2>📈 P&L</h2>
                <div class="stat-value" id="totalPnl">$0</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>⚙️ Settings</h2>
                <form class="settings-form" id="settingsForm">
                    <div class="form-group">
                        <label>Max Trade Amount (USDC)</label>
                        <input type="number" id="maxAmount" step="0.01" min="1" value="50">
                    </div>
                    <div class="form-group">
                        <label>Trade Percentage (%)</label>
                        <input type="number" id="tradePercentage" step="1" min="1" max="100" value="10">
                    </div>
                    <div class="form-group">
                        <label>Max Trades to Track</label>
                        <input type="number" id="maxTrades" min="1" max="100" value="20">
                    </div>
                    <div class="form-group">
                        <label>Poll Interval (seconds)</label>
                        <input type="number" id="pollInterval" min="10" max="300" value="30">
                    </div>
                    <button type="submit">Save Settings</button>
                </form>
            </div>
            
            <div class="card" style="grid-column: span 2;">
                <h2>📜 Trade History</h2>
                <div class="tabs">
                    <div class="tab active" onclick="showTab('all')">All Trades</div>
                    <div class="tab" onclick="showTab('target')">Target Only</div>
                    <div class="tab" onclick="showTab('copied')">Copied Only</div>
                </div>
                
                <div class="tab-content active" id="tab-all">
                    <table class="trades-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Market</th>
                                <th>Side</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Latency</th>
                            </tr>
                        </thead>
                        <tbody id="tradesTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        let currentTab = 'all';
        let trades = [];
        
        // Connection status
        socket.on('connect', () => {
            document.getElementById('connectionStatus').textContent = 'Connected';
            document.getElementById('connectionStatus').className = 'connection-status connected';
        });
        
        socket.on('disconnect', () => {
            document.getElementById('connectionStatus').textContent = 'Disconnected';
            document.getElementById('connectionStatus').className = 'connection-status disconnected';
        });
        
        // Load initial data
        async function loadConfig() {
            const res = await fetch('/api/config');
            const config = await res.json();
            document.getElementById('targetUsername').textContent = config.target_username;
            document.getElementById('maxAmount').value = config.max_trade_amount;
            document.getElementById('tradePercentage').value = config.trade_percentage;
            document.getElementById('maxTrades').value = config.max_trades_to_track;
            document.getElementById('pollInterval').value = config.poll_interval;
        }
        
        async function loadStats() {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('totalTrades').textContent = stats.total_trades;
            document.getElementById('totalVolume').textContent = '$' + stats.total_volume_usdc.toLocaleString();
            document.getElementById('avgLatency').textContent = stats.avg_latency_seconds.toFixed(1) + 's';
            
            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (stats.total_pnl >= 0 ? '+' : '') + '$' + stats.total_pnl.toLocaleString();
            pnlEl.className = 'stat-value ' + (stats.total_pnl >= 0 ? 'positive' : 'negative');
        }
        
        async function loadTrades() {
            const res = await fetch('/api/trades');
            trades = await res.json();
            renderTrades();
        }
        
        function renderTrades() {
            const tbody = document.getElementById('tradesTable');
            tbody.innerHTML = '';
            
            const filtered = trades.filter(t => {
                if (currentTab === 'target') return t.is_target_trade;
                if (currentTab === 'copied') return !t.is_target_trade;
                return true;
            });
            
            filtered.slice(0, 50).forEach(trade => {
                const row = document.createElement('tr');
                const time = trade.timestamp ? new Date(trade.timestamp).toLocaleString() : '-';
                const sideClass = trade.side === 'BUY' ? 'badge-buy' : 'badge-sell';
                const statusClass = 'badge-' + trade.status;
                
                row.innerHTML = `
                    <td>${time}</td>
                    <td>${trade.market_question || 'Unknown'}</td>
                    <td><span class="badge ${sideClass}">${trade.side}</span></td>
                    <td>$${(trade.copied_amount || trade.original_amount || 0).toFixed(2)}</td>
                    <td><span class="badge ${statusClass}">${trade.status}</span></td>
                    <td class="latency">${trade.latency_seconds ? trade.latency_seconds.toFixed(1) + 's' : '-'}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderTrades();
        }
        
        // Real-time updates
        socket.on('new_trade', (trade) => {
            trades.unshift(trade);
            renderTrades();
            loadStats();
        });
        
        socket.on('stats_update', (stats) => {
            document.getElementById('totalTrades').textContent = stats.total_trades;
            document.getElementById('totalVolume').textContent = '$' + stats.total_volume_usdc.toLocaleString();
            document.getElementById('avgLatency').textContent = stats.avg_latency_seconds.toFixed(1) + 's';
        });
        
        socket.on('config_update', (config) => {
            document.getElementById('maxAmount').value = config.max_trade_amount;
            document.getElementById('tradePercentage').value = config.trade_percentage;
            document.getElementById('maxTrades').value = config.max_trades_to_track;
            document.getElementById('pollInterval').value = config.poll_interval;
        });
        
        // Settings form
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                max_trade_amount: parseFloat(document.getElementById('maxAmount').value),
                trade_percentage: parseFloat(document.getElementById('tradePercentage').value),
                max_trades_to_track: parseInt(document.getElementById('maxTrades').value),
                poll_interval: parseInt(document.getElementById('pollInterval').value)
            };
            
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        });
        
        // Initial load
        loadConfig();
        loadStats();
        loadTrades();
        
        // Refresh stats every 5 seconds
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
